<!DOCTYPE html>
<html>
<head>
  <title>Vault 111 Live Stream</title>
  <style>
    body {
      background:#020402;
      color:#33ff66;
      font-family:"Courier New", monospace;
      margin:0;
      text-align:center;
      text-shadow:0 0 6px #00ff66;
      animation:flicker 0.15s infinite;
    }

    header {
      background:#001a00;
      border-bottom:3px solid #33ff66;
      padding:25px;
      font-size:34px;
      letter-spacing:4px;
    }

    main {
      margin-top:50px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:20px;
      position:relative;
    }

    iframe {
      border:2px solid #33ff66;
      border-radius:4px;
      width:720px;
      height:480px;
    }

    .button {
      width:200px;
      padding:12px;
      border:2px solid #33ff66;
      background:#001100;
      cursor:pointer;
      font-size:16px;
      color:#33ff66;
      text-decoration:none;
      display:inline-block;
      text-align:center;
      transition:0.2s;
    }

    .button:hover {
      background:#33ff66;
      color:black;
      box-shadow:0 0 20px #33ff66;
      transform:scale(1.05);
    }

    .offline-overlay {
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      width:720px;
      height:480px;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#001100;
      border:2px solid #33ff66;
      border-radius:4px;
      font-size:24px;
      text-align:center;
      box-shadow:0 0 20px #33ff66;
    }

    body::after{
      content:"";
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:repeating-linear-gradient(
        to bottom,
        rgba(0,255,0,0.05),
        rgba(0,255,0,0.05) 2px,
        transparent 2px,
        transparent 4px
      );
      pointer-events:none;
    }

    @keyframes flicker{
      0%{opacity:0.95;}
      50%{opacity:1;}
      100%{opacity:0.97;}
    }
  </style>
</head>
<body>

<header>VAULT 111 LIVE STREAM</header>

<main>
  <!-- YouTube live embed -->
  <iframe id="yt-stream" src="https://www.youtube.com/embed/live_stream?channel=@Theoverseer111&autoplay=1" frameborder="0" allowfullscreen></iframe>

  <!-- Offline overlay (hidden by default, shown if stream is offline) -->
  <div id="offline-message" class="offline-overlay" style="display:none;">
    VAULT OVERSEER IS OFFLINE<br>
    Check back later for live missions.
  </div>

  <!-- Buttons -->
  <a href="https://www.youtube.com/@Theoverseer111" target="_blank" class="button">
    Chat on YouTube Live
  </a>
  <a href="chat.html" class="button">
    Site Chat
  </a>
</main>

<script>
  // Simple offline check
  const iframe = document.getElementById('yt-stream');
  const offline = document.getElementById('offline-message');

  // YouTube doesn't provide a direct "is live" API in embed, so this is a basic fallback
  // We'll assume if the embed fails to load (network error), show offline
  iframe.onerror = function() {
    offline.style.display = 'flex';
    iframe.style.display = 'none';
  };

  // Optional: hide offline if video loads (basic)
  iframe.onload = function() {
    offline.style.display = 'none';
    iframe.style.display = 'block';
  };
</script>

</body>
</html>
