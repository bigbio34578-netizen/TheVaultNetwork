<!DOCTYPE html>
<html>
<head>
  <title>Vault 111 Video Archives</title>
  <style>
    body{
      background:#020402;
      color:#33ff66;
      font-family:"Courier New", monospace;
      margin:0;
      text-align:center;
      text-shadow:0 0 6px #00ff66;
      animation:flicker 0.15s infinite;
    }

    /* NAVBAR */
    .navbar{
      background:#001a00;
      border-bottom:2px solid #33ff66;
      padding:10px;
      text-align:center;
    }

    .navbar a{
      color:#33ff66;
      text-decoration:none;
      margin:0 15px;
      font-size:16px;
    }

    .navbar a:hover{
      color:black;
      background:#33ff66;
      padding:5px 10px;
    }

    header{
      font-size:28px;
      margin-top:20px;
      text-align:center;
    }

    .video-gallery{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:20px;
      margin-top:40px;
    }

    .video-item{
      border:2px solid #33ff66;
      border-radius:5px;
      padding:10px;
      background:#001100;
      width:360px;
    }

    iframe{
      width:100%;
      height:200px;
      border:2px solid #33ff66;
      border-radius:4px;
    }

    .button{
      padding:10px 15px;
      margin-top:10px;
      display:inline-block;
      border:2px solid #33ff66;
      background:#001100;
      color:#33ff66;
      text-decoration:none;
      cursor:pointer;
      transition:0.2s;
    }

    .button:hover{
      background:#33ff66;
      color:black;
      transform:scale(1.05);
    }

    body::after{
      content:"";
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:repeating-linear-gradient(
        to bottom,
        rgba(0,255,0,0.05),
        rgba(0,255,0,0.05) 2px,
        transparent 2px,
        transparent 4px
      );
      pointer-events:none;
    }

    @keyframes flicker{
      0%{opacity:0.95;}
      50%{opacity:1;}
      100%{opacity:0.97;}
    }
  </style>
</head>

<body>

<div class="navbar">
  <a href="index.html">HOME</a>
  <a href="live.html">STREAMS</a>
  <a href="videos.html">VIDEOS</a>
  <a href="chat.html">CHAT</a>
  <a href="upload.html">UPLOAD</a>
  <a href="support.html">SUPPORT</a>
</div>

<header>VAULT 111 VIDEO ARCHIVES</header>

<div class="video-gallery">
  <!-- Video 1 -->
  <div class="video-item">
    <iframe src="https://www.youtube.com/embed/BH_6ZAbD0iM" frameborder="0" allowfullscreen></iframe>
    <div>Video 1</div>
    <a href="https://www.youtube.com/watch?v=BH_6ZAbD0iM" target="_blank" class="button">Watch on YouTube</a>
  </div>

  <!-- Video 2 -->
  <div class="video-item">
    <iframe src="https://www.youtube.com/embed/-WU_5Uqoh9I" frameborder="0" allowfullscreen></iframe>
    <div>Video 2</div>
    <a href="https://www.youtube.com/watch?v=-WU_5Uqoh9I" target="_blank" class="button">Watch on YouTube</a>
  </div>
</div>

</body>
</html>
