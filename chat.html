<!DOCTYPE html>
<html>
<head>
<title>Vault 111 Chat Terminal</title>
<style>
body{
background:#020402;
color:#33ff66;
font-family:"Courier New", monospace;
margin:0;
text-shadow:0 0 6px #00ff66;
}
/* NAVBAR */
.navbar{
background:#001a00;
border-bottom:2px solid #33ff66;
padding:10px;
text-align:center;
}
.navbar a{
color:#33ff66;
text-decoration:none;
margin:0 15px;
font-size:16px;
}
.navbar a:hover{
color:black;
background:#33ff66;
padding:5px 10px;
}
.navbar a.disabled{
opacity:0.5;
cursor:not-allowed;
}
/* HEADER */
header{
text-align:center;
font-size:28px;
margin-top:20px;
}
/* CHAT BOX */
.chatbox{
width:80%;
height:400px;
margin:40px auto;
border:2px solid #33ff66;
background:#001100;
padding:20px;
overflow-y:auto;
}
/* INPUT AREA */
.input-area{
width:80%;
margin:auto;
display:flex;
gap:10px;
}
input{
flex:1;
padding:10px;
background:black;
color:#33ff66;
border:2px solid #33ff66;
font-family:monospace;
}
button{
padding:10px 20px;
background:black;
color:#33ff66;
border:2px solid #33ff66;
cursor:pointer;
}
button:hover{
background:#33ff66;
color:black;
}
</style>
</head>
<body>

<div class="navbar">
<a href="index.html">HOME</a>
<a href="live.html">STREAMS</a>
<a href="videos.html">VIDEOS</a>
<a href="chat.html">CHAT</a>
<a href="upload.html" class="disabled">UPLOAD</a>
<a href="support.html">SUPPORT</a>
<a href="dono.html">DONATIONS</a>
</div>

<header>VAULT 111 COMMUNITY CHAT</header>

<div class="chatbox" id="chatbox">
<p><b>System:</b> Vault communication channel opened.</p>
</div>

<div class="input-area">
<input id="messageInput" placeholder="Type message..." onkeydown="checkEnter(event)">
<button onclick="sendMessage()">SEND</button>
</div>

<!-- Firebase (compat version for static HTML) -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
  // Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyBHAoMY2R77a1zVN7V_ccs4qREIZWdG8wE",
    authDomain: "vault111-chat.firebaseapp.com",
    databaseURL: "https://vault111-chat-default-rtdb.firebaseio.com/",
    projectId: "vault111-chat",
    storageBucket: "vault111-chat.appspot.com",
    messagingSenderId: "1086459102791",
    appId: "1:1086459102791:web:0c22ed85971b25983d1362"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Vault Dweller ID
  let vaultID = Math.floor(1000 + Math.random() * 9000);
  const chat = document.getElementById("chatbox");

  // Join message
  const joinMsg = document.createElement("p");
  joinMsg.innerHTML = `<b>System:</b> Vault Dweller #${vaultID} has entered the chat.`;
  chat.appendChild(joinMsg);

  // Send message function
  function sendMessage() {
    const input = document.getElementById("messageInput");
    if(input.value.trim() !== "") {
      const messageObj = { id: vaultID, text: input.value, timestamp: Date.now() };
      db.ref('messages').push(messageObj);
      input.value = "";
    }
  }

  // Enter key handler
  function checkEnter(event){
    if(event.key === "Enter"){ sendMessage(); }
  }

  // Listen for new messages
  db.ref('messages').on('child_added', snapshot => {
    const msg = snapshot.val();
    const p = document.createElement("p");
    p.innerHTML = `<b>Vault Dweller #${msg.id}:</b> ${msg.text}`;
    chat.appendChild(p);
    chat.scrollTop = chat.scrollHeight;
  });
</script>

</body>
</html>
