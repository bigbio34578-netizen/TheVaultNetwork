<!DOCTYPE html>
<html>
<head>
  <title>Vault 111 Overseer Terminal</title>
  <style>
    body{
      background:#020402;
      color:#33ff66;
      font-family:"Courier New", monospace;
      margin:0;
      text-align:center;
      text-shadow:0 0 6px #00ff66;
    }

    /* CRT Glow */
    body{
      text-shadow:0 0 6px #00ff66;
    }

    /* Header */
    header{
      background:#001a00;
      border-bottom:3px solid #33ff66;
      padding:25px;
      font-size:34px;
      letter-spacing:4px;
    }

    /* Main menu */
    .menu{
      margin-top:80px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:20px;
    }

    /* Terminal buttons */
    .button{
      width:320px;
      padding:18px;
      border:2px solid #33ff66;
      background:#001100;
      cursor:pointer;
      font-size:18px;
      transition:0.2s;
    }

    .button:hover{
      background:#33ff66;
      color:black;
      box-shadow:0 0 20px #33ff66;
      transform:scale(1.05);
    }

    /* Disabled button */
    .button.disabled{
      opacity:0.5;
      cursor:not-allowed;
      box-shadow:none;
      transform:none;
    }

    /* CRT scanlines */
    body::after{
      content:"";
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:repeating-linear-gradient(
        to bottom,
        rgba(0,255,0,0.05),
        rgba(0,255,0,0.05) 2px,
        transparent 2px,
        transparent 4px
      );
      pointer-events:none;
    }

    /* Flicker animation */
    @keyframes flicker{
      0%{opacity:0.95;}
      50%{opacity:1;}
      100%{opacity:0.97;}
    }

    body{
      animation:flicker 0.15s infinite;
    }

  </style>
</head>
<body>

<header>VAULT 111 OVERSEER TERMINAL</header>

<div class="menu">

  <div class="button" onclick="location.href='live.html'">ACCESS STREAM DATABASE</div>

  <div class="button" onclick="location.href='videos.html'">OPEN VIDEO ARCHIVES</div>

  <div class="button" onclick="location.href='chat.html'">ENTER VAULT CHAT</div>

  <div class="button disabled">UPLOAD CONTENT</div>

  <div class="button" onclick="location.href='support.html'">SUPPORT THE VAULT</div>

  <div class="button" onclick="location.href='dono.html'">DONATIONS</div>

</div>

</body>
</html>
